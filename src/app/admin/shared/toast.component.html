<!-- Toasts -->
<div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 w-80">
  @for (t of toast.toasts(); track t.id) {
    <div
      class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg border text-sm font-medium animate-fade-in"
      [class]="t.type === 'success'
        ? 'bg-green-50 border-green-200 text-green-800'
        : t.type === 'error'
        ? 'bg-red-50 border-red-200 text-red-800'
        : 'bg-blue-50 border-blue-200 text-blue-800'"
    >
      <span class="text-base mt-0.5">
        {{ t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️' }}
      </span>
      <span class="flex-1">{{ t.message }}</span>
      <button (click)="toast.dismiss(t.id)" class="opacity-50 hover:opacity-100 transition-opacity text-lg leading-none">×</button>
    </div>
  }
</div>

<!-- Confirm dialog -->
@if (toast.confirmState(); as state) {
  <div class="fixed inset-0 z-[99] flex items-center justify-center p-4 bg-black/40">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
      <p class="text-gray-800 text-sm mb-6 leading-relaxed">{{ state.message }}</p>
      <div class="flex justify-end gap-3">
        <button
          (click)="toast.resolveConfirm(false)"
          class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-lg transition-colors"
        >
          Annuler
        </button>
        <button
          (click)="toast.resolveConfirm(true)"
          class="px-4 py-2 text-sm font-semibold text-white bg-red-500 hover:bg-red-600 rounded-lg transition-colors"
        >
          Confirmer
        </button>
      </div>
    </div>
  </div>
}
