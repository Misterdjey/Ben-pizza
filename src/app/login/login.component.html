<div class="min-h-screen bg-stone flex items-center justify-center px-4">
  <div class="w-full max-w-sm overflow-hidden rounded-sm shadow-xl">

    <div class="bg-slate-dark px-8 py-10 text-center">
      <div class="font-playfair text-[10px] tracking-[0.25em] uppercase text-white/25 mb-5">Espace professionnel</div>
      <div class="font-playfair text-[34px] font-normal text-cream leading-none">
        by <span class="font-semibold text-slate-pale">Ben</span>
      </div>
    </div>

    <div class="bg-white px-8 py-8">
      @if (auth.errorMessage()) {
        <div class="bg-red-50 border border-red-200 text-red-600 font-dm text-[12px] rounded-sm px-4 py-3 mb-5">
          {{ auth.errorMessage() }}
        </div>
      }

      <button
        (click)="login()"
        class="w-full flex items-center justify-center gap-3 border border-stone-mid bg-white text-ink font-dm text-[13px] py-3 px-6 rounded-sm hover:bg-stone transition-colors"
      >
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuer avec Google
      </button>

      <div class="mt-6 text-center font-dm text-[10px] text-stone-deep tracking-[0.05em]">Accès réservé</div>
    </div>

  </div>
</div>
