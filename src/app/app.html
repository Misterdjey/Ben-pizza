<header class="sticky top-0 z-50 bg-cream/95 backdrop-blur-sm border-b border-stone-mid">
  <nav class="max-w-7xl mx-auto px-8 md:px-16">
    <div class="flex justify-between items-center py-5">
      <div class="font-playfair font-semibold text-xl text-ink">Benjamin Pizza</div>
      <div class="flex items-center gap-5">
        <button
          (click)="langService.toggle()"
          class="font-dm text-[11px] tracking-[0.12em] uppercase text-stone-deep hover:text-ink transition-colors"
        >
          {{ langService.lang() === 'fr' ? 'EN' : 'FR' }}
        </button>
        <button class="bg-slate text-cream font-dm font-medium text-[11px] tracking-[0.12em] uppercase rounded-sm px-6 py-2.5 hover:bg-slate-dark transition-colors">
          {{ langService.t().nav.bookNow }}
        </button>
      </div>
    </div>
  </nav>
</header>

<main>
  <div id="section-hero"><app-hero></app-hero></div>
  <div id="section-menu"><app-menu></app-menu></div>
  <div id="section-offers"><app-offers></app-offers></div>
  <div id="section-how-it-works"><app-how-it-works></app-how-it-works></div>
  <div id="section-gallery"><app-gallery></app-gallery></div>
  <div id="section-testimonials"><app-testimonials></app-testimonials></div>
  <div id="section-contact"><app-cta></app-cta></div>
</main>

<footer class="bg-slate-dark py-10 pb-24 md:pb-10">
  <div class="max-w-7xl mx-auto px-8 md:px-16 text-center">
    <p class="font-dm text-[13px] text-white/40">{{ langService.t().footer.copyright }}</p>
  </div>
</footer>

<app-floating-toolbar></app-floating-toolbar>
