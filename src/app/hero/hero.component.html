<section class="relative flex items-end bg-slate-dark overflow-hidden" style="height: 92vh; min-height: 580px;">

  <!-- Background image -->
  <div
    class="absolute inset-0 bg-center bg-cover opacity-45"
    style="background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1600&q=85')"
  ></div>

  <!-- Hidden video kept for ViewChild compatibility -->
  <video #heroVideo src="/images/benjamin-pizzaiolo-clip.mp4" playsinline class="hidden"></video>

  <!-- Gradient overlay bottom to top -->
  <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(44,62,77,0.85) 0%, rgba(44,62,77,0.10) 60%)"></div>

  <!-- Content -->
  <div class="relative z-10 w-full px-8 md:px-16 pb-16 md:pb-[72px] flex flex-col md:flex-row justify-between items-start md:items-end gap-10">
    <div class="max-w-xl">
      <p class="font-dm text-[10px] tracking-[0.24em] uppercase text-slate-pale mb-4 opacity-80">Pizzaiolo à domicile · Île-de-France</p>
      <h1 class="font-playfair font-semibold text-[52px] md:text-[88px] leading-[0.93] text-cream">
        La pizza<br><em class="font-normal text-slate-pale">chez vous,</em><br>vraiment.
      </h1>
    </div>
    <div class="md:text-right max-w-[300px] md:pb-1.5">
      <p class="font-dm font-light text-[15px] text-white/55 leading-[1.75] mb-7">
        Une expérience artisanale dans votre cuisine. Ben se déplace, installe son atelier, et fait le reste.
      </p>
      <button class="border border-white/35 bg-transparent text-cream font-dm font-medium text-[11px] tracking-[0.14em] uppercase rounded-sm px-7 py-3 hover:bg-white/10 transition-colors">
        Découvrir
      </button>
    </div>
  </div>
</section>
