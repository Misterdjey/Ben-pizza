<section class="py-20 bg-charcoal">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-5xl md:text-6xl font-bebas text-white mb-4">{{ t().gallery.title }}</h2>
      <p class="text-xl text-gray-300 max-w-2xl mx-auto">{{ t().gallery.subtitle }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (src of imageSrcs; track $index; let i = $index) {
        <div class="group relative overflow-hidden rounded-2xl">
          <img
            [src]="src"
            [alt]="t().gallery.alts[i]"
            class="w-full h-64 object-cover transition-transform duration-300 group-hover:scale-110"
          >
          <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
            <span class="text-white text-lg font-semibold">{{ t().gallery.captions[i] }}</span>
          </div>
        </div>
      }
    </div>

    <div class="text-center mt-16">
      <div class="bg-gradient-to-r from-pizza-orange to-pizza-red rounded-2xl p-8 max-w-md mx-auto">
        <div class="text-4xl mb-4">📸</div>
        <h3 class="text-2xl font-bebas text-white mb-4">{{ t().gallery.instagramTitle }}</h3>
        <p class="text-white mb-6">{{ t().gallery.instagramText }}</p>
        <button class="bg-white text-pizza-orange font-bold py-3 px-6 rounded-full hover:bg-gray-100 transition-colors duration-300">
          @benjaminpizza
        </button>
      </div>
    </div>
  </div>
</section>
