<section class="bg-stone py-24 md:py-28 px-8 md:px-16">
  <div class="max-w-7xl mx-auto">

    <div class="mb-10">
      <p class="font-dm text-[9px] tracking-[0.28em] uppercase text-stone-deep mb-3">Photos</p>
      <h2 class="font-playfair font-semibold text-[50px] leading-[1.05] text-ink">
        L'atelier <em class="font-normal">en images.</em>
      </h2>
    </div>

    <!-- Grille avec flèches latérales -->
    <div class="flex items-center gap-3">

      <!-- Flèche gauche -->
      <button
        (click)="prevPage()"
        [disabled]="pageIndex() === 0"
        class="shrink-0 text-slate/40 hover:text-slate transition-colors disabled:opacity-20 disabled:cursor-not-allowed"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Grille photos -->
      <div class="flex-1 grid gap-1" style="grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 256px 256px;">

        <!-- Grande image (span 2 lignes) -->
        @if (pageImages()[0]) {
          <div
            class="gallery-cell rounded-sm overflow-hidden bg-stone-mid cursor-pointer"
            style="grid-row: 1 / 3;"
            (click)="openLightbox(pageImages()[0].globalIndex)"
          >
            <img [src]="pageImages()[0].src" [alt]="pageImages()[0].alt" class="w-full h-full object-cover" style="filter: saturate(0.9);">
            <div class="gallery-overlay absolute inset-0 flex items-center justify-center" style="background: rgba(74,98,114,0.5);">
              <svg class="w-10 h-10 text-cream" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7" stroke-width="1.5"/>
                <path stroke-linecap="round" stroke-width="1.5" d="M21 21l-4.35-4.35"/>
                <path stroke-linecap="round" stroke-width="1.5" d="M8 11h6M11 8v6"/>
              </svg>
            </div>
          </div>
        }

        <!-- 4 petites images -->
        @for (img of pageImages().slice(1); track img.globalIndex) {
          <div
            class="gallery-cell rounded-sm overflow-hidden bg-stone-mid cursor-pointer"
            (click)="openLightbox(img.globalIndex)"
          >
            <img [src]="img.src" [alt]="img.alt" class="w-full h-full object-cover" style="filter: saturate(0.9);">
            <div class="gallery-overlay absolute inset-0 flex items-center justify-center" style="background: rgba(74,98,114,0.5);">
              <svg class="w-8 h-8 text-cream" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7" stroke-width="1.5"/>
                <path stroke-linecap="round" stroke-width="1.5" d="M21 21l-4.35-4.35"/>
                <path stroke-linecap="round" stroke-width="1.5" d="M8 11h6M11 8v6"/>
              </svg>
            </div>
          </div>
        }

      </div>

      <!-- Flèche droite -->
      <button
        (click)="nextPage()"
        [disabled]="pageIndex() === totalPages() - 1"
        class="shrink-0 text-slate/40 hover:text-slate transition-colors disabled:opacity-20 disabled:cursor-not-allowed"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
        </svg>
      </button>

    </div>

    <!-- Points de pagination -->
    @if (totalPages() > 1) {
      <div class="flex justify-center gap-2 mt-5">
        @for (p of pages(); track p) {
          <button
            (click)="goToPage(p)"
            class="rounded-full transition-all duration-300"
            [class]="pageIndex() === p ? 'w-6 h-2 bg-slate' : 'w-2 h-2 bg-stone-mid border border-slate/30 hover:bg-slate/30'"
          ></button>
        }
      </div>
    }

  </div>
</section>

<!-- Lightbox -->
@if (lightboxOpen()) {
  <div
    class="fixed inset-0 z-[300] flex items-center justify-center lightbox-backdrop"
    style="background: rgba(0,0,0,0.90);"
    (click)="closeLightbox()"
  >
    <button
      (click)="closeLightbox(); $event.stopPropagation()"
      class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors"
    >
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <img
      [src]="imageSrcs[lightboxIndex()]"
      [alt]="t().gallery.alts[lightboxIndex()]"
      class="max-w-[90vw] max-h-[90vh] object-contain rounded-sm"
      (click)="$event.stopPropagation()"
    >

    <button
      (click)="lightboxPrev(); $event.stopPropagation()"
      class="absolute left-6 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors"
    >
      <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <button
      (click)="lightboxNext(); $event.stopPropagation()"
      class="absolute right-6 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors"
    >
      <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
}
