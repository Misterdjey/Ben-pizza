<section class="bg-cream py-24 md:py-28 px-8 md:px-16">
  <div class="max-w-7xl mx-auto">

    <div class="mb-12">
      <p class="font-dm text-[9px] tracking-[0.28em] uppercase text-stone-deep mb-3">Avis clients</p>
      <h2 class="font-playfair font-semibold text-[50px] leading-[1.05] text-ink">
        Ce qu'ils <em class="font-normal">en pensent.</em>
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      @for (item of t().testimonials.items.slice(0, 3); track item.name) {
        <div class="bg-stone border border-stone-mid rounded-sm p-7">
          <div class="text-[12px] text-slate tracking-[3px] mb-3.5">★★★★★</div>
          <p class="font-playfair italic text-[17px] text-ink leading-[1.6] mb-[18px]">"{{ item.quote }}"</p>
          <div class="font-dm text-[11px] text-stone-deep tracking-[0.1em] uppercase font-medium">— {{ item.name }} · {{ item.event }}</div>
        </div>
      }
    </div>

  </div>
</section>
