<section class="py-20 bg-charcoal">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-5xl md:text-6xl font-bebas text-white mb-4">{{ t().menu.title }}</h2>
      <p class="text-xl text-gray-300 max-w-2xl mx-auto">{{ t().menu.subtitle }}</p>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-12">
      <button
        (click)="selectCategory('all')"
        class="px-6 py-3 rounded-full font-semibold transition-all duration-300 hover:scale-105"
        [class]="selectedCategory === 'all' ? 'bg-pizza-orange text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'"
      >
        {{ t().menu.allPizzas }}
      </button>
      @for (category of categories; track category) {
        <button
          (click)="selectCategory(category)"
          class="px-6 py-3 rounded-full font-semibold transition-all duration-300 hover:scale-105"
          [class]="selectedCategory === category ? 'bg-pizza-orange text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'"
        >
          {{ category }}
        </button>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (pizza of filteredPizzas; track pizza.name) {
        <div class="bg-gray-800 rounded-2xl overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:scale-105">
          <div class="relative overflow-hidden">
            <img
              [src]="pizza.image"
              [alt]="pizza.name"
              class="w-full h-48 object-cover transition-transform duration-300 hover:scale-110"
            >
            <div class="absolute top-4 right-4 bg-pizza-orange text-white px-3 py-1 rounded-full text-sm font-bold">
              {{ pizza.category }}
            </div>
          </div>
          <div class="p-6">
            <h3 class="text-2xl font-bebas text-white mb-3">{{ pizza.name }}</h3>
            <div class="flex flex-wrap gap-2">
              @for (ingredient of pizza.ingredients; track ingredient) {
                <span class="bg-gray-700 text-gray-300 px-3 py-1 rounded-full text-sm">
                  {{ ingredient }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
