<section class="py-20 bg-stone">
  <div class="max-w-7xl mx-auto px-8 md:px-16">
    <div class="text-center mb-16">
      <p class="font-dm text-[9px] tracking-[0.28em] uppercase text-stone-deep mb-4">La carte</p>
      <h2 class="font-playfair font-semibold text-[50px] leading-tight text-ink mb-4">{{ t().menu.title }}</h2>
      <p class="font-dm font-light text-[15px] leading-relaxed text-[#5A5550] max-w-2xl mx-auto">{{ t().menu.subtitle }}</p>
    </div>

    <div class="flex flex-wrap justify-center gap-3 mb-12">
      <button
        (click)="selectCategory('all')"
        class="px-5 py-2 font-dm font-medium text-[11px] tracking-[0.12em] uppercase rounded-sm transition-all"
        [class]="selectedCategory() === 'all' ? 'bg-slate text-cream' : 'border border-slate/40 bg-transparent text-slate hover:bg-slate/5'"
      >
        {{ t().menu.allPizzas }}
      </button>
      @for (category of categories; track category) {
        <button
          (click)="selectCategory(category)"
          class="px-5 py-2 font-dm font-medium text-[11px] tracking-[0.12em] uppercase rounded-sm transition-all"
          [class]="selectedCategory() === category ? 'bg-slate text-cream' : 'border border-slate/40 bg-transparent text-slate hover:bg-slate/5'"
        >
          {{ category }}
        </button>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (pizza of filteredPizzas(); track pizza.name) {
        <div class="bg-cream rounded-sm overflow-hidden border border-stone-mid hover:shadow-md transition-shadow">
          <div class="relative overflow-hidden">
            <img
              [src]="pizza.image"
              [alt]="pizza.name"
              class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-105"
            >
            <div class="absolute top-3 right-3 bg-slate text-slate-pale text-[10px] tracking-widest rounded-sm px-2.5 py-1">
              {{ pizza.category }}
            </div>
          </div>
          <div class="p-5">
            <h3 class="font-playfair font-semibold text-[22px] text-ink mb-3">{{ pizza.name }}</h3>
            <div class="flex flex-wrap gap-2">
              @for (ingredient of pizza.ingredients; track ingredient) {
                <span class="bg-stone text-[#5A5550] font-dm text-[11px] tracking-wide px-2.5 py-1 rounded-sm">
                  {{ ingredient }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
