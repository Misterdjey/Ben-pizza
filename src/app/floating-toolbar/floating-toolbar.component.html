<!-- Desktop : panneau vertical fixe à droite -->
<div class="hidden md:flex fixed right-4 top-1/2 -translate-y-1/2 z-[200] flex-col gap-2 select-none">

  <!-- Section navigation -->
  <div class="bg-ink/80 backdrop-blur-sm rounded-sm p-2 border border-white/10 shadow-xl flex flex-col gap-0.5">
    <p class="font-dm text-stone-deep text-[9px] uppercase tracking-widest text-center mb-1.5">Nav</p>
    @for (section of sections; track section.id) {
      <button
        (click)="scrollTo(section.id)"
        class="flex items-center gap-2 px-2.5 py-1.5 rounded-sm text-stone-deep hover:text-cream hover:bg-white/10 transition-all duration-200 text-left"
      >
        <span class="text-sm leading-none">{{ section.icon }}</span>
        <span class="font-dm text-[11px]">{{ section.label }}</span>
      </button>
    }
  </div>

  <!-- Scroll to top -->
  @if (showScrollTop()) {
    <button
      (click)="scrollTop()"
      class="bg-ink/80 backdrop-blur-sm rounded-sm p-2.5 border border-white/10 shadow-xl text-stone-deep hover:text-cream hover:bg-white/10 transition-all duration-200 text-center font-dm text-xs"
    >
      ↑ top
    </button>
  }

</div>

<!-- Mobile : barre fixe en bas -->
<div class="flex md:hidden fixed bottom-0 left-0 right-0 z-[200] bg-ink/90 backdrop-blur-sm border-t border-white/10 select-none">

  <!-- Section nav dots -->
  @for (section of sections; track section.id) {
    <button
      (click)="scrollTo(section.id)"
      class="flex-1 flex flex-col items-center justify-center py-3 text-stone-deep hover:text-cream transition-colors"
    >
      <span class="text-base leading-none">{{ section.icon }}</span>
    </button>
  }

  <!-- Scroll to top -->
  <button
    (click)="scrollTop()"
    class="flex-1 flex flex-col items-center justify-center py-3 transition-colors"
    [class]="showScrollTop() ? 'text-cream' : 'text-stone-deep/40'"
  >
    <span class="text-lg">↑</span>
  </button>

</div>
