<!-- NAV -->
<header class="sticky top-0 z-50 bg-stone/95 backdrop-blur-sm border-b border-stone-mid">
  <nav class="flex justify-between items-center px-8 md:px-16 py-5">
    <a href="#" class="font-playfair text-[22px] tracking-[0.04em] font-normal text-ink hover:opacity-70 transition-opacity">
      by <span class="font-semibold text-slate">Ben</span>
    </a>

    <!-- Desktop -->
    <div class="hidden md:flex items-center gap-10">
      <a href="#section-how-it-works" class="font-dm text-[13px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Concept</a>
      <a href="#section-offers" class="font-dm text-[13px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Offres</a>
      <a href="#section-gallery" class="font-dm text-[13px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Photos</a>
      <a href="#section-testimonials" class="font-dm text-[13px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Avis</a>
      <a href="#section-contact" class="bg-slate text-cream font-dm font-medium text-[12px] tracking-[0.12em] uppercase rounded-sm px-6 py-2.5 hover:bg-slate-dark transition-colors">
        Réserver
      </a>
      <a href="https://instagram.com/benyochem_pizza" target="_blank" rel="noopener noreferrer" class="flex items-center text-stone-deep hover:text-slate transition-colors" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>

    <!-- Burger (mobile) -->
    <button (click)="toggleMenu()" class="md:hidden text-ink p-1 -mr-1" aria-label="Menu">
      @if (menuOpen()) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      }
    </button>
  </nav>

  <!-- Menu mobile -->
  @if (menuOpen()) {
    <div class="md:hidden border-t border-stone-mid bg-stone px-8 py-6 flex flex-col gap-6">
      <a href="#section-how-it-works" (click)="closeMenu()" class="font-dm text-[15px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Concept</a>
      <a href="#section-offers" (click)="closeMenu()" class="font-dm text-[15px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Offres</a>
      <a href="#section-gallery" (click)="closeMenu()" class="font-dm text-[15px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Photos</a>
      <a href="#section-testimonials" (click)="closeMenu()" class="font-dm text-[15px] tracking-[0.1em] text-stone-deep uppercase hover:text-slate transition-colors">Avis</a>
      <div class="pt-1 flex items-center gap-5">
        <a href="#section-contact" (click)="closeMenu()" class="bg-slate text-cream font-dm font-medium text-[12px] tracking-[0.12em] uppercase rounded-sm px-6 py-2.5 hover:bg-slate-dark transition-colors">
          Réserver
        </a>
        <a href="https://instagram.com/benyochem_pizza" target="_blank" rel="noopener noreferrer" class="flex items-center text-stone-deep hover:text-slate transition-colors" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
        </a>
      </div>
    </div>
  }
</header>

<main>
  <div id="section-hero"><app-hero></app-hero></div>

  <!-- Band -->
  <div class="bg-slate px-8 md:px-16 py-3.5 flex items-center gap-8">
    <span class="font-dm text-[10px] tracking-[0.22em] text-slate-pale uppercase font-medium whitespace-nowrap opacity-80">Découvrir l'expérience</span>
    <div class="flex-1 h-px bg-slate-light opacity-40"></div>
  </div>

  <div id="section-how-it-works"><app-how-it-works></app-how-it-works></div>
  <div id="section-offers"><app-offers></app-offers></div>
  <div id="section-gallery"><app-gallery></app-gallery></div>
  <div id="section-testimonials"><app-testimonials></app-testimonials></div>
  <div id="section-contact"><app-cta></app-cta></div>
</main>

<!-- FOOTER -->
<footer class="bg-slate-dark px-8 md:px-16 py-7 flex flex-col md:flex-row justify-between items-center gap-4">
  <div class="font-playfair text-[18px] tracking-[0.08em] text-white/40 font-normal">
    by <span class="font-semibold text-slate-pale">Ben</span>
  </div>
  <div class="flex gap-8">
    <a href="#section-how-it-works" class="font-dm text-[10px] text-white/25 tracking-[0.08em] uppercase hover:text-white/50 transition-colors">Concept</a>
    <a href="#section-offers" class="font-dm text-[10px] text-white/25 tracking-[0.08em] uppercase hover:text-white/50 transition-colors">Offres</a>
    <a href="#section-contact" class="font-dm text-[10px] text-white/25 tracking-[0.08em] uppercase hover:text-white/50 transition-colors">Contact</a>
    <a routerLink="/admin" class="font-dm text-[10px] text-white/25 tracking-[0.08em] uppercase hover:text-white/50 transition-colors">Pro</a>
  </div>
  <div class="font-dm text-[10px] text-white/20">© 2025 · Île-de-France</div>
</footer>
